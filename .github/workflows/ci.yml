name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ml:
    name: ML pipeline (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest -q

  web:
    name: Web (parity + build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: ONNX parity (TS serving == Python training)
        run: pnpm parity
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
